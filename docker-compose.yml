  backend:
    build: ./backend
    container_name: cleanflow_backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./results:/app/results
    user: "1000:1000"
    networks:
      - cleanflow-net

  frontend:
    build: ./frontend
    container_name: cleanflow_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    env_file:
      - ./frontend/.env
    tty: true
    stdin_open: true
    depends_on:
      - backend
    networks:
      - cleanflow-net

networks:
  cleanflow-net:
    driver: bridge

volumes:
  postgres_data: