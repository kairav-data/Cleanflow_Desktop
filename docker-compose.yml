  backend:
    build: ./backend
    container_name: cleanflow_backend
    restart: always
    env_file:
      - ./backend/.env
    # Extra env vars that override what's in backend/.env for Docker context.
    # HF_API_KEY is read directly by the backend (chatbot + visualizer).
    environment:
      - HF_API_KEY=${VITE_HF_API_KEY:-}
      # Tells CORS to allow the frontend container.
      # Inside Docker network the frontend is accessed via its published port on the host.
      - FRONTEND_URL=http://localhost:${FRONTEND_PORT:-5173}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./results:/app/results
    user: "1000:1000"
    networks:
      - cleanflow-net

  frontend:
    build:
      context: ./frontend
      # VITE_ vars must be passed as build args so Vite bakes them into the bundle.
      # The frontend container talks to backend over the Docker internal network
      # using the service name "backend".
      args:
        - VITE_API_BASE_URL=http://backend:8000
        - VITE_HF_API_KEY=${VITE_HF_API_KEY:-}
    container_name: cleanflow_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    env_file:
      - ./frontend/.env
    tty: true
    stdin_open: true
    depends_on:
      - backend
    networks:
      - cleanflow-net

networks:
  cleanflow-net:
    driver: bridge

volumes:
  postgres_data: