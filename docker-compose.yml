services:
  backend:
    build: ./backend
    container_name: cleanflow_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      # HF_API_KEY is what backend code reads (chatbot.py + features/visualizer.py)
      - HF_API_KEY=${VITE_HF_API_KEY:-}
      # CORS: browser hits the backend from localhost, so allow localhost origins.
      # The static list in main.py already includes http://localhost:5173,
      # so this override is only needed if you change FRONTEND_PORT.
      - FRONTEND_URL=http://localhost:${FRONTEND_PORT:-5173}
      # ── Email Notification node credentials ──────────────────────────────────
      # Set these in ./backend/.env  (never commit real passwords to git)
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_PORT=${SMTP_PORT:-587}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./results:/app/results
    user: "1000:1000"
    networks:
      - cleanflow-net

  frontend:
    build:
      context: ./frontend
      args:
        # ─────────────────────────────────────────────────────────────────────
        # IMPORTANT: VITE_API_BASE_URL must be what the BROWSER can reach.
        #
        # The browser runs on your HOST machine (Windows), not inside Docker.
        # "backend" is a Docker-internal hostname – the browser cannot resolve it.
        #
        # Docker maps backend container port 8000 → host port 8000, so the
        # browser reaches it at http://localhost:8000.
        # ─────────────────────────────────────────────────────────────────────
        - VITE_API_BASE_URL=http://localhost:${BACKEND_PORT:-8000}
        - VITE_HF_API_KEY=${VITE_HF_API_KEY:-}
    container_name: cleanflow_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    env_file:
      - ./frontend/.env
    tty: true
    stdin_open: true
    depends_on:
      - backend
    networks:
      - cleanflow-net

networks:
  cleanflow-net:
    driver: bridge

volumes:
  postgres_data: